<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Social links Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="parent">
        <div class="parent-wrapper">
            <div class="social-container">
                <div class="content">
                    <img src="images/avatar-jessica.jpeg" alt="Jessica Pic">
                    <h1 class="main-heading">Jessica Randall</h1>
                    <p class="location">
                        London, United Kingdom
                    </p>
                    <p class="para">
                        "Front-end developer and avit reader"
                    </p>
                </div>
                <div class="social-links">
                    <ul>
                        <li><a href="https://github.com/hammad-bin-siddique/">Github</a></li>
                        <li><a href="https://www.frontendmentor.io/">Frontent Mentor</a></li>
                        <li><a href="www.linkedin.com/in/hammad-siddique-95267a324">Linkedin</a></li>
                        <li><a href="#">Twitter</a></li>
                        <li><a href="#">Instagram</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
